<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SULTANBET216 | THE ULTIMATE EMPIRE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS المهندسين - نظام معقد جداً */
        :root {
            --sultan-gold: #ffcc00; --sultan-black: #050608; --sultan-card: #11141b;
            --sultan-blue: #0066ff; --neon-glow: 0 0 15px rgba(255, 204, 0, 0.6);
        }

        body { background: var(--sultan-black); color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }

        /* الأنيميشن السحابي */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(50px); opacity: 0.3; }

        /* الهيدر الإمبراطوري */
        .sultan-header {
            background: rgba(17, 20, 27, 0.95); backdrop-filter: blur(15px);
            padding: 20px; border-bottom: 2px solid var(--sultan-gold);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
        }

        .balance-pill {
            background: linear-gradient(90deg, #1e2533, #11141b);
            border: 1px solid var(--sultan-gold); border-radius: 50px; padding: 5px 20px;
            box-shadow: var(--neon-glow); font-weight: 900; color: var(--sultan-gold);
        }

        /* نظام الأقسام المتعددة */
        .mega-nav { display: flex; overflow-x: auto; padding: 15px; gap: 15px; scrollbar-width: none; }
        .nav-card {
            min-width: 120px; background: var(--sultan-card); padding: 15px; border-radius: 15px;
            text-align: center; border: 1px solid #2d3446; cursor: pointer; transition: 0.4s;
        }
        .nav-card.active { border-color: var(--sultan-gold); background: var(--sultan-blue); }

        /* كروت الألعاب - نظام الجرافيك المطور */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-item {
            position: relative; border-radius: 20px; overflow: hidden; border: 1px solid #2d3446;
            height: 200px; transition: 0.5s; cursor: pointer;
        }
        .game-item img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }
        .game-item:hover { transform: scale(1.05); border-color: var(--sultan-gold); box-shadow: var(--neon-glow); }
        .game-badge { position: absolute; top: 10px; right: 10px; background: red; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }

        /* نظام المراهنات الحي - الخوارزمية */
        .live-bet-box {
            background: var(--sultan-card); margin: 15px; border-radius: 20px; padding: 20px;
            border-left: 5px solid var(--sultan-blue);
        }
        .odd-btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .odd-btn {
            background: #1e2533; border: 1px solid #363c4d; color: white; padding: 12px;
            border-radius: 12px; transition: 0.2s; font-weight: bold;
        }
        .odd-btn:hover { background: var(--sultan-gold); color: black; }

        /* الـ Footer الذكي */
        .sultan-footer {
            position: fixed; bottom: 0; width: 100%; background: #0d1117;
            display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #2d3446;
        }
        .footer-link { color: #8a94a6; text-decoration: none; text-align: center; font-size: 11px; }
        .footer-link.active { color: var(--sultan-gold); }

        /* الـ Modal الخارق للألعاب */
        #game-engine-overlay {
            display: none; position: fixed; inset: 0; background: #000; z-index: 10000;
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="sultan-header">
    <div style="font-size: 24px; font-weight: 900; color: var(--sultan-gold);">SULTAN<span style="color:white">BET216</span></div>
    <div class="balance-pill" id="displayBalance">50,000.00 DT</div>
</div>

<div class="mega-nav">
    <div class="nav-card active" onclick="switchView('sports')"><i class="fas fa-futbol"></i><br>الرياضة</div>
    <div class="nav-card" onclick="switchView('casino')"><i class="fas fa-dice"></i><br>الكازينو</div>
    <div class="nav-card" onclick="switchView('live')"><i class="fas fa-video"></i><br>لايف</div>
    <div class="nav-card" onclick="openTerminal()"><i class="fas fa-code"></i><br>الأدمن</div>
</div>

<div id="view-sports">
    <div id="matches-engine">
        </div>
</div>

<div id="view-casino" style="display:none;">
    <div class="game-grid">
        <div class="game-item" onclick="startEngine('vs20olympgate')">
            <span class="game-badge">HOT</span>
            <img src="https://www.pragmaticplay.com/wp-content/uploads/2021/02/Gates-of-Olympus_Thumbnail.png">
        </div>
        <div class="game-item" onclick="startEngine('wanted')">
            <img src="https://hacksawgaming.com/storage/games/wanted-dead-or-a-wild/wanted-dead-or-a-wild-thumbnail.jpg">
        </div>
    </div>
</div>

<div id="game-engine-overlay">
    <div style="padding: 10px; background: #111; display: flex; justify-content: space-between;">
        <span style="color:var(--sultan-gold)">محرك الألعاب VIP</span>
        <button onclick="stopEngine()" style="background:red; border:none; color:white; padding:5px 15px; border-radius:5px;">إغلاق ❌</button>
    </div>
    <iframe id="global-iframe" src="" width="100%" height="95%" frameborder="0"></iframe>
</div>

<nav class="sultan-footer">
    <a href="#" class="footer-link active"><i class="fas fa-home fa-lg"></i><br>الرئيسية</a>
    <a href="javascript:void(0)" onclick="alert('D17: 216XXXXXXXX')" class="footer-link"><i class="fas fa-wallet fa-lg"></i><br>شحن</a>
    <a href="javascript:void(0)" onclick="switchView('casino')" class="footer-link"><i class="fas fa-slot-machine fa-lg"></i><br>كازينو</a>
    <a href="javascript:void(0)" onclick="openTerminal()" class="footer-link"><i class="fas fa-user-crown fa-lg"></i><br>سلطان</a>
</nav>

<script>
    // --- المحرك الإمبراطوري SULTAN-LEGACY JS ---
    
    let wallet = 50000.00;

    // 1. نظام الجرافيك (Three.js) - يضيف آلاف العمليات الحسابية في الثانية
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const geometry = new THREE.TorusGeometry(10, 3, 16, 100);
    const material = new THREE.MeshBasicMaterial({ color: 0xffcc00, wireframe: true });
    const torus = new THREE.Mesh(geometry, material);
    scene.add(torus);
    camera.position.z = 30;

    function animateBg() {
        requestAnimationFrame(animateBg);
        torus.rotation.x += 0.01; torus.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animateBg();

    // 2. خوارزمية توليد الماتشوات أوتوماتيكياً
    function buildSports() {
        const teams = ["ريال مدريد", "مانشستر سيتي", "الترجي", "الأهلي", "برشلونة", "بايرن ميونخ", "ميلان", "يوفنتوس"];
        let html = "";
        for(let i=0; i<10; i++) {
            let t1 = teams[Math.floor(Math.random()*teams.length)];
            let t2 = teams[Math.floor(Math.random()*teams.length)];
            if(t1 === t2) t2 = "باريس سان جيرمان";
            html += `
            <div class="live-bet-box">
                <div style="font-size:12px; color:#8a94a6;">دوري أبطال السلطان • مباشر</div>
                <div style="display:flex; justify-content:space-between; margin-top:10px; font-weight:900;">
                    <span>${t1}</span> <span style="color:var(--sultan-gold)">VS</span> <span>${t2}</span>
                </div>
                <div class="odd-btn-group">
                    <button class="odd-btn" onclick="placeBet('${t1}', 2.15)">1<br>2.15</button>
                    <button class="odd-btn" onclick="placeBet('تعادل', 3.40)">X<br>3.40</button>
                    <button class="odd-btn" onclick="placeBet('${t2}', 3.10)">2<br>3.10</button>
                </div>
            </div>`;
        }
        document.getElementById('matches-engine').innerHTML = html;
    }

    // 3. نظام التوجيه
    function switchView(view) {
        $(".view-sports, #view-casino").hide(); 
        if(view === 'sports') $("#view-sports").show();
        if(view === 'casino') $("#view-casino").show();
        $(".nav-card").removeClass("active");
        $(event.currentTarget).addClass("active");
    }

    // 4. محرك الألعاب VIP
    function startEngine(id) {
        let url = id === 'wanted' ? "https://demo.hacksawgaming.com/wanted-dead-or-a-wild" : `https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=${id}&lang=ar&cur=USD`;
        $("#global-iframe").attr("src", url);
        $("#game-engine-overlay").fadeIn();
    }

    function stopEngine() {
        $("#game-engine-overlay").fadeOut();
        $("#global-iframe").attr("src", "");
    }

    // 5. لوحة التحكم (Root Password: sultan216)
    function openTerminal() {
        let p = prompt("ACCESS CODE:");
        if(p === "sultan216") {
            let n = prompt("NEW BALANCE:");
            if(n) { wallet = parseFloat(n); updateUI(); }
        }
    }

    function placeBet(t, o) {
        let a = prompt(`رهان على ${t}:`);
        if(a && a <= wallet) {
            wallet -= a; updateUI();
            alert(`✅ تم قبول الرهان! الربح: ${(a*o).toFixed(2)} DT`);
        }
    }

    function updateUI() { document.getElementById('displayBalance').innerText = wallet.toLocaleString() + " DT"; }

    $(document).ready(() => { buildSports(); updateUI(); });
</script>

</body>
</html>
