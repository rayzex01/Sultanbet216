<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SULTANBET | CASINO SLOTS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --kartoosh-bg: #0f1115;
            --kartoosh-card: #1b1e24;
            --kartoosh-gold: #ffcc00;
            --kartoosh-text: #9ba3b1;
            --kartoosh-blue: #0056fb;
        }

        body { 
            background-color: var(--kartoosh-bg); color: white; 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px;
        }

        /* Header Style (Like Kartoosh) */
        header {
            background: #16191f; padding: 12px 20px; display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid #2a2e37; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: 900; color: var(--kartoosh-gold); letter-spacing: -1px; }
        .auth-btns .btn-login { background: transparent; color: white; border: none; font-weight: bold; margin-left: 10px; }
        .auth-btns .btn-join { background: var(--kartoosh-blue); color: white; border: none; border-radius: 8px; padding: 6px 15px; font-weight: bold; }

        /* Search & Filters */
        .search-container { padding: 15px; background: #16191f; }
        .search-bar { 
            background: #252932; border: 1px solid #363c47; border-radius: 10px; 
            padding: 10px; display: flex; align-items: center; color: var(--kartoosh-text);
        }
        .search-bar input { background: none; border: none; color: white; width: 100%; outline: none; margin-right: 10px; }

        /* Providers Scroller */
        .providers-nav { display: flex; overflow-x: auto; padding: 10px 15px; gap: 10px; scrollbar-width: none; }
        .provider-item { 
            background: var(--kartoosh-card); padding: 8px 15px; border-radius: 10px; 
            white-space: nowrap; font-size: 13px; color: var(--kartoosh-text); border: 1px solid transparent;
        }
        .provider-item.active { border-color: var(--kartoosh-gold); color: white; }

        /* Slots Grid (Original Kartoosh Layout) */
        .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .slot-card { 
            background: var(--kartoosh-card); border-radius: 12px; overflow: hidden; 
            position: relative; transition: 0.3s; aspect-ratio: 1/1.3;
        }
        .slot-card img { width: 100%; height: 100%; object-fit: cover; }
        .slot-card:hover { transform: translateY(-5px); border: 1px solid var(--kartoosh-gold); }
        .provider-tag { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.7); font-size: 9px; padding: 4px; text-align: center;
        }

        /* Game Frame Overlay */
        #gameOverlay {
            display: none; position: fixed; inset: 0; background: black; z-index: 9999;
        }
        .close-game {
            position: absolute; top: 15px; left: 15px; background: red; color: white;
            border: none; border-radius: 50%; width: 35px; height: 35px; font-weight: bold;
        }

        /* Footer Navigation */
        footer {
            position: fixed; bottom: 0; width: 100%; background: #16191f;
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #2a2e37; z-index: 1000;
        }
        .foot-item { color: var(--kartoosh-text); text-decoration: none; text-align: center; font-size: 11px; }
        .foot-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .foot-item.active { color: var(--kartoosh-gold); }
    </style>
</head>
<body>

    <header>
        <div class="logo">SULTAN<span style="color:white">BET</span></div>
        <div class="auth-btns">
            <button class="btn-login">Connexion</button>
            <button class="btn-join">S'inscrire</button>
        </div>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <i class="fa fa-search"></i>
            <input type="text" placeholder="Rechercher un jeu..." id="gameSearch">
        </div>
    </div>

    <div class="providers-nav">
        <div class="provider-item active">Tous</div>
        <div class="provider-item">Pragmatic Play</div>
        <div class="provider-item">Hacksaw</div>
        <div class="provider-item">Play'n GO</div>
        <div class="provider-item">NoLimit City</div>
        <div class="provider-item">NetEnt</div>
    </div>

    <div class="slots-grid" id="slotsContainer">
        </div>

    <div id="gameOverlay">
        <button class="close-game" onclick="closeGame()">X</button>
        <iframe id="gameIframe" src="" width="100%" height="100%" frameborder="0"></iframe>
    </div>

    <footer>
        <a href="#" class="foot-item active"><i class="fa fa-home"></i>Accueil</a>
        <a href="#" class="foot-item"><i class="fa fa-futbol"></i>Sport</a>
        <a href="#" class="foot-item"><i class="fa fa-dice"></i>Casino</a>
        <a href="#" class="foot-item"><i class="fa fa-star"></i>Favoris</a>
        <a href="#" class="foot-item"><i class="fa fa-bars"></i>Menu</a>
    </footer>

    <script>
        // داتابيز الألعاب (Kartoosh Style)
        const games = [
            { name: "Gates of Olympus", id: "vs20olympgate", provider: "Pragmatic Play", img: "https://www.pragmaticplay.com/wp-content/uploads/2021/02/Gates-of-Olympus_Thumbnail.png" },
            { name: "Wanted Dead or Wild", id: "wanted", provider: "Hacksaw", img: "https://hacksawgaming.com/storage/games/wanted-dead-or-a-wild/wanted-dead-or-a-wild-thumbnail.jpg" },
            { name: "Sweet Bonanza", id: "vswaysbc", provider: "Pragmatic Play", img: "https://www.pragmaticplay.com/wp-content/uploads/2020/02/Sweet-Bonanza_Thumbnail.png" },
            { name: "Sugar Rush", id: "vs20sugarrush", provider: "Pragmatic Play", img: "https://www.pragmaticplay.com/wp-content/uploads/2022/06/Sugar-Rush_Thumbnail.png" },
            { name: "Big Bass Splash", id: "vs10bbasplash", provider: "Pragmatic Play", img: "https://www.pragmaticplay.com/wp-content/uploads/2022/05/Big-Bass-Splash_Thumbnail.png" },
            { name: "RIP City", id: "rip-city", provider: "Hacksaw", img: "https://hacksawgaming.com/storage/games/rip-city/rip-city-thumbnail.jpg" },
            { name: "Starlight Princess", id: "vs20starlight", provider: "Pragmatic Play", img: "https://www.pragmaticplay.com/wp-content/uploads/2021/09/Starlight-Princess_Thumbnail.png" },
            { name: "Chaos Crew 2", id: "chaos-crew-2", provider: "Hacksaw", img: "https://hacksawgaming.com/storage/games/chaos-crew-2/chaos-crew-2-thumbnail.jpg" },
            { name: "Fruit Party", id: "vs20fruitparty", provider: "Pragmatic Play", img: "https://www.pragmaticplay.com/wp-content/uploads/2020/05/Fruit-Party_Thumbnail.png" }
        ];

        function loadGames() {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = games.map(game => `
                <div class="slot-card" onclick="playGame('${game.id}')">
                    <img src="${game.img}" alt="${game.name}">
                    <div class="provider-tag">${game.provider}</div>
                </div>
            `).join('');
        }

        function playGame(id) {
            let url = "";
            if(id === 'wanted' || id === 'rip-city' || id === 'chaos-crew-2') {
                url = `https://demo.hacksawgaming.com/${id}`;
            } else {
                url = `https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=${id}&lang=fr&cur=EUR`;
            }
            document.getElementById('gameIframe').src = url;
            document.getElementById('gameOverlay').style.display = 'block';
        }

        function closeGame() {
            document.getElementById('gameOverlay').style.display = 'none';
            document.getElementById('gameIframe').src = "";
        }

        // Search Filter Logic
        document.getElementById('gameSearch').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = games.filter(g => g.name.toLowerCase().includes(term));
            const container = document.getElementById('slotsContainer');
            container.innerHTML = filtered.map(game => `
                <div class="slot-card" onclick="playGame('${game.id}')">
                    <img src="${game.img}" alt="${game.name}">
                    <div class="provider-tag">${game.provider}</div>
                </div>
            `).join('');
        });

        window.onload = loadGames;
    </script>
</body>
</html>
