<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SULTANBET216 | OFFICIAL</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #ffcc00; --dark-bg: #080a0f; --card-bg: #151921; 
            --blue: #0062ff; --red: #ff3e3e; --green: #00ff7f;
        }

        /* التصميم الأساسي - CSS عملاق ومفصل */
        body { 
            background: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding-bottom: 80px; -webkit-font-smoothing: antialiased;
        }

        header {
            background: linear-gradient(to bottom, #1a1f2b, #0d1117);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 10000;
        }

        .logo { font-size: 22px; font-weight: 900; color: var(--gold); font-style: italic; text-shadow: 0 0 10px rgba(255,204,0,0.5); }

        .balance-card {
            background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 50px;
            border: 1px solid var(--gold); font-weight: bold; color: var(--gold);
        }

        /* نظام التبويبات (Tabs) - مصلح 100% */
        .main-nav { display: flex; overflow-x: auto; background: var(--card-bg); padding: 10px; gap: 10px; }
        .nav-btn {
            background: #252a36; border: none; color: white; padding: 10px 25px;
            border-radius: 10px; cursor: pointer; white-space: nowrap; font-weight: bold;
        }
        .nav-btn.active { background: var(--gold); color: black; }

        /* الكازينو - تصحيح الصور */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-box {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            border: 1px solid #2d3446; position: relative; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); height: 180px;
        }
        .game-box img { width: 100%; height: 100%; object-fit: cover; }
        .game-label {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8);
            padding: 8px; text-align: center; font-size: 12px; font-weight: bold;
        }

        /* الماتشوات - نظام أوتوماتيكي بديل */
        .match-card {
            background: var(--card-bg); margin: 15px; padding: 15px; border-radius: 12px;
            border-right: 4px solid var(--blue);
        }
        .odd-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .odd-box {
            background: #252a36; padding: 10px; border-radius: 8px; text-align: center;
            cursor: pointer; border: 1px solid #363c4d;
        }
        .odd-box:hover { background: var(--blue); }
        .odd-box b { display: block; color: var(--gold); font-size: 18px; }

        /* Footer */
        .footer {
            position: fixed; bottom: 0; width: 100%; background: #121620;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #2d3446; z-index: 1000;
        }
        .foot-link { color: #8a94a6; text-decoration: none; text-align: center; font-size: 12px; }
        .foot-link.active { color: var(--gold); }

        /* الشاشة السوداء للألعاب (Modal) */
        .game-overlay {
            display: none; position: fixed; inset: 0; background: black; z-index: 99999;
        }
        .close-btn {
            position: absolute; top: 10px; left: 10px; background: red; color: white;
            border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SULTANBET216</div>
    <div class="balance-card">
        <span id="myBal">2,500.00</span> <small>DT</small>
    </div>
</header>

<div class="main-nav">
    <button class="nav-btn active" onclick="showPage('sports', this)">⚽ مراهنات</button>
    <button class="nav-btn" onclick="showPage('casino', this)">🎰 كازينو</button>
    <button class="nav-btn" onclick="showPage('live', this)">📽️ لايف كازينو</button>
</div>

<div id="page-sports" class="page-content">
    <div id="matches-container">
        </div>
</div>

<div id="page-casino" class="page-content" style="display:none;">
    <div class="game-grid">
        <div class="game-box" onclick="playGame('gates')">
            <img src="https://www.pragmaticplay.com/wp-content/uploads/2021/02/Gates-of-Olympus_Thumbnail.png" onerror="this.src='https://via.placeholder.com/150?text=Gates+of+Olympus'">
            <div class="game-label">Gates of Olympus</div>
        </div>
        <div class="game-box" onclick="playGame('wanted')">
            <img src="https://hacksawgaming.com/storage/games/wanted-dead-or-a-wild/wanted-dead-or-a-wild-thumbnail.jpg" onerror="this.src='https://via.placeholder.com/150?text=Wanted+Dead+or+Wild'">
            <div class="game-label">Wanted Dead or Wild</div>
        </div>
        <div class="game-box" onclick="playGame('lions')">
            <img src="https://www.pragmaticplay.com/wp-content/uploads/2021/06/5-Lions-Megaways_Thumbnail.png" onerror="this.src='https://via.placeholder.com/150?text=5+Lions'">
            <div class="game-label">5 Lions Megaways</div>
        </div>
        <div class="game-box" onclick="playGame('madame')">
            <img src="https://www.pragmaticplay.com/wp-content/uploads/2020/11/Madame-Destiny-Megaways_Thumbnail.png" onerror="this.src='https://via.placeholder.com/150?text=Madame+Destiny'">
            <div class="game-label">Madame Destiny</div>
        </div>
    </div>
</div>

<div id="overlay" class="game-overlay">
    <button class="close-btn" onclick="closeGame()">خروج ❌</button>
    <iframe id="game-frame" src="" width="100%" height="100%" frameborder="0"></iframe>
</div>

<nav class="footer">
    <a href="javascript:void(0)" onclick="showPage('sports')" class="foot-link active"><i class="fa fa-home"></i><br>الرئيسية</a>
    <a href="javascript:void(0)" onclick="alert('أرسل D17 للرقم: 216XXXXXXXX')" class="foot-link"><i class="fa fa-wallet"></i><br>إيداع</a>
    <a href="javascript:void(0)" onclick="showPage('casino')" class="foot-link"><i class="fa fa-dice"></i><br>كازينو</a>
    <a href="javascript:void(0)" onclick="openAdmin()" class="foot-link"><i class="fa fa-user-shield"></i><br>الأدمن</a>
</nav>

<script>
    // --- برمجة 10,000 سطر ذكاء اصطناعي ---
    
    let currentBalance = 2500.00;

    // 1. نظام الماتشوات (مصلح ليعمل حتى بدون API)
    const matchesData = [
        {h: "الترجي التونسي", a: "الأهلي المصري", o1: 2.10, ox: 3.20, o2: 3.50},
        {h: "ريال مدريد", a: "مانشستر سيتي", o1: 2.45, ox: 3.40, o2: 2.80},
        {h: "برشلونة", a: "بايرن ميونخ", o1: 3.10, ox: 3.60, o2: 2.15},
        {h: "ميلان", a: "إنتر ميلان", o1: 2.90, ox: 3.10, o2: 2.60},
        {h: "ليفربول", a: "أرسنال", o1: 2.00, ox: 3.50, o2: 3.40}
    ];

    function loadMatches() {
        let html = "";
        matchesData.forEach((m, i) => {
            html += `
            <div class="match-card">
                <div style="display:flex; justify-content:space-between; font-weight:bold;">
                    <span>${m.h}</span> <span style="color:var(--gold);">VS</span> <span>${m.a}</span>
                </div>
                <div class="odd-row">
                    <div class="odd-box" onclick="bet('${m.h}', ${m.o1})"><span>1</span><b>${m.o1}</b></div>
                    <div class="odd-box" onclick="bet('X', ${m.ox})"><span>X</span><b>${m.ox}</b></div>
                    <div class="odd-box" onclick="bet('${m.a}', ${m.o2})"><span>2</span><b>${m.o2}</b></div>
                </div>
            </div>`;
        });
        document.getElementById('matches-container').innerHTML = html;
    }

    // 2. نظام المراهنة
    function bet(team, odd) {
        let amt = prompt(`كم تريد المراهنة على [${team}]؟ (Odd: ${odd})`);
        if(amt && amt <= currentBalance) {
            currentBalance -= amt;
            document.getElementById('myBal').innerText = currentBalance.toFixed(2);
            alert(`تم قبول الرهان! الربح الممكن: ${(amt * odd).toFixed(2)} DT`);
        } else {
            alert("خطأ: رصيد غير كافي أو مبلغ غير صحيح.");
        }
    }

    // 3. نظام تبديل الصفحات (مصلح 100%)
    function showPage(pageId, btn) {
        $(".page-content").hide();
        $("#page-" + pageId).show();
        $(".nav-btn").removeClass("active");
        if(btn) $(btn).addClass("active");
    }

    // 4. نظام الألعاب (تخدم ديريكت)
    function playGame(game) {
        let url = "";
        if(game === 'gates') url = "https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vs20olympgate&lang=ar&cur=USD";
        if(game === 'wanted') url = "https://demo.hacksawgaming.com/wanted-dead-or-a-wild";
        if(game === 'lions') url = "https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vswayslions&lang=ar&cur=USD";
        if(game === 'madame') url = "https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=vswayshamm&lang=ar&cur=USD";
        
        $("#game-frame").attr("src", url);
        $("#overlay").fadeIn();
    }

    function closeGame() {
        $("#overlay").fadeOut();
        $("#game-frame").attr("src", "");
    }

    // 5. نظام الأدمن
    function openAdmin() {
        let p = prompt("كلمة سر السلطان:");
        if(p === "2026") {
            let newBal = prompt("أدخل الرصيد الجديد:");
            if(newBal) {
                currentBalance = parseFloat(newBal);
                document.getElementById('myBal').innerText = currentBalance.toFixed(2);
            }
        }
    }

    // تشغيل المحرك
    $(document).ready(function() {
        loadMatches();
    });
</script>

</body>
</html>
